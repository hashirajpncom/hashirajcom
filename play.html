<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Hashira - Action</title>
    <style>
        :root { --p: #007bff; --bg: #f0f5fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .game-card {
            background: white; padding: 30px; border-radius: 24px;
            width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative; transition: 0.3s;
        }

        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--p); width: 0%; transition: 0.4s; }

        .q-text { font-size: 0.8rem; color: #999; text-transform: uppercase; font-weight: bold; }
        .word-box { margin: 30px 0; padding: 40px 20px; background: #fbfdff; border-radius: 20px; border: 2px solid #edf2f7; }
        .main-word { font-size: 2.2rem; font-weight: 800; color: #2d3748; display: block; line-height: 1.2; }

        .ans-grid { display: grid; gap: 12px; }
        .ans-btn {
            background: white; border: 2px solid #edf2f7; padding: 16px; border-radius: 16px;
            cursor: pointer; font-size: 1.05rem; font-weight: 600; color: #4a5568;
            transition: all 0.2s; outline: none;
        }
        .ans-btn:hover { border-color: var(--p); background: #f0f7ff; transform: translateY(-2px); }
        .ans-btn.correct { background: #28a745; color: white; border-color: #28a745; }
        .ans-btn.wrong { background: #dc3545; color: white; border-color: #dc3545; }

        .fade { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="game-card fade" id="box">
    <div id="game-ui">
        <div class="q-text" id="info">SOAL 1</div>
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <div class="word-box">
            <span class="main-word" id="word">Memuat...</span>
        </div>
        <div class="ans-grid" id="options"></div>
    </div>
</div>

    // Database Langsung di Sini (Anti Gagal Narik)

{k:"醤油(しょうゆ)",a:"Kecap Asin"},{k:"石鹸(せっけん)",a:"Sabun"},{k:"服(ふく)",a:"Baju"},{k:"靴(くつ)",a:"Sepatu"},{k:"靴下(くつした)",a:"Kaos Kaki"},{k:"眼鏡(めがね)",a:"Kacamata"},{k:"財布(さいふ)",a:"Dompet"},{k:"切手(きって)",a:"Prangko"},{k:"葉書(はがき)",a:"Kartu Pos"},{k:"封筒(ふうとう)",a:"Amplop"},{k:"荷物(にもつ)",a:"Barang"},{k:"お金(おかね)",a:"Uang"},{k:"切符(きっぷ)",a:"Tiket"},{k:"地図(ちず)",a:"Peta"},{k:"写真(しゃしん)",a:"Foto"},{k:"手紙(てがみ)",a:"Surat"},{k:"箱(はこ)",a:"Kotak"},{k:"花(はな)",a:"Bunga"},{k:"木(き)",a:"Pohon"},{k:"天気(てんき)",a:"Cuaca"},{k:"雨(あめ)",a:"Hujan"},{k:"雪(ゆき)",a:"Salju"},{k:"風(かぜ)",a:"Angin"},{k:"飛行機(ひこうき)",a:"Pesawat"},{k:"船(ふね)",a:"Kapal"},{k:"電車(でんしゃ)",a:"Kereta"},{k:"地下鉄(ちかてつ)",a:"Kereta Bawah Tanah"},{k:"新幹線(しんかんせん)",a:"Kereta Cepat"},{k:"バス(ばす)",a:"Bus"},{k:"タクシー(たくしー)",a:"Taksi"},{k:"自転車(じてんしゃ)",a:"Sepeda"},{k:"歩き(あるき)",a:"Jalan Kaki"},{k:"空(そら)",a:"Langit"},{k:"太陽(たいよう)",a:"Matahari"},{k:"月(つき)",a:"Bulan"},{k:"星(ほし)",a:"Bintang"},{k:"山(やま)",a:"Gunung"},{k:"川(かわ)",a:"Sungai"},{k:"海(うみ)",a:"Laut"},{k:"島(しま)",a:"Pulau"},{k:"森(もり)",a:"Hutan"},{k:"道(みち)",a:"Jalan"},{k:"橋(はし)",a:"Jembatan"},{k:"建物(たてもの)",a:"Bangunan"},{k:"アパート(あぱーと)",a:"Apartemen"},{k:"デパート(でぱーと)",a:"Mal"},{k:"スーパー(すーぱー)",a:"Supermarket"},{k:"コンビニ(こんびに)",a:"Minimarket"},{k:"ホテル(ほてる)",a:"Hotel"},{k:"大使館(たいしかん)",a:"Kedutaan"},{k:"市役所(しやくしょ)",a:"Kantor Walikota"},{k:"警察署(けいさつしょ)",a:"Kantor Polisi"},{k:"消防署(しょうぼうしょ)",a:"Kantor Damkar"},{k:"動物(どうぶつ)",a:"Hewan"},{k:"犬(いぬ)",a:"Anjing"},{k:"猫(ねこ)",a:"Kucing"},{k:"鳥(とり)",a:"Burung"},{k:"馬(うま)",a:"Kuda"},{k:"牛(うし)",a:"Sapi"},{k:"豚(ぶた)",a:"Babi"},{k:"鶏(にわとり)",a:"Ayam"},{k:"象(ぞう)",a:"Gajah"},{k:"蛇(へび)",a:"Ular"},{k:"虫(むし)",a:"Serangga"},{k:"身体(からだ)",a:"Tubuh"},{k:"頭(あたま)",a:"Kepala"},{k:"顔(かお)",a:"Wajah"},{k:"目(め)",a:"Mata"},{k:"鼻(はな)",a:"Hidung"},{k:"口(くち)",a:"Mulut"},{k:"耳(みみ)",a:"Telinga"},{k:"髪(かみ)",a:"Rambut"},{k:"手(て)",a:"Tangan"},{k:"足(あし)",a:"Kaki"},{k:"指(ゆび)",a:"Jari"},{k:"喉(のど)",a:"Tenggorokan"},{k:"背中(せなか)",a:"Punggung"},{k:"お腹(おなか)",a:"Perut"},{k:"薬(くすり)",a:"Obat"},{k:"スポーツ(すぽーつ)",a:"Olahraga"},{k:"サッカー(さっかー)",a:"Sepak Bola"},{k:"テニス(てにす)",a:"Tenis"},{k:"野球(やきゅう)",a:"Bisbol"},{k:"水泳(すいえい)",a:"Renang"},{k:"音楽(おんがく)",a:"Musik"},{k:"歌(うた)",a:"Lagu"},{k:"映画(えいが)",a:"Film"},{k:"漫画(まんが)",a:"Manga"},{k:"アニメ(あにめ)",a:"Anime"},{k:"趣味(しゅみ)",a:"Hobi"},{k:"勉強(べんきょう)",a:"Belajar"},{k:"仕事(しごと)",a:"Pekerjaan"},{k:"授業(じゅぎょう)",a:"Pelajaran"},{k:"宿題(しゅくだい)",a:"PR"},{k:"試験(しけん)",a:"Ujian"},{k:"意味(いmi)",a:"Arti"},{k:"言葉(ことば)",a:"Kata"},{k:"会話(かいわ)",a:"Percakapan"},{k:"作文(さくぶん)",a:"Karangan"},{k:"漢字(かんじ)",a:"Kanji"},{k:"平仮名(ひらがな)",a:"Hiragana"},{k:"片仮名(かたかな)",a:"Katakana"},{k:"名前(なまえ)",a:"Nama"},{k:"電話(でんわ)",a:"Telepon"},{k:"メール(めーる)",a:"Email"},{k:"ニュース(にゅーす)",a:"Berita"},{k:"掃除(そうじ)",a:"Pembersihan"},{k:"洗濯(せんたく)",a:"Cucian"},{k:"料理(りょうり)",a:"Masakan"},{k:"買い物(かいもの)",a:"Belanja"},{k:"散歩(さんぽ)",a:"Jalan-jalan"},{k:"旅行(りょこう)",a:"Wisata"},{k:"練習(れんしゅう)",a:"Latihan"},{k:"質問(しつもん)",a:"Pertanyaan"},{k:"答え(こたえ)",a:"Jawaban"},{k:"話(はなし)",a:"Cerita"},{k:"用事(ようじ)",a:"Urusan"},{k:"約束(やくそく)",a:"Janji"},{k:"時間(じかん)",a:"Waktu"},{k:"半分(はんぶん)",a:"Setengah"},{k:"昨日(きのう)",a:"Kemarin"},{k:"一昨日(おととい)",a:"Lusa Kemarin"},{k:"再来週(さらいしゅう)",a:"Dua Minggu Lagi"},{k:"今月(こんげつ)",a:"Bulan Ini"},{k:"来月(らいげつ)",a:"Bulan Depan"},{k:"先月(せんげつ)",a:"Bulan Lalu"},{k:"今年(ことし)",a:"Tahun Ini"},{k:"来年(らいねん)",a:"Tahun Depan"},{k:"去年(きょねん)",a:"Tahun Lalu"},{k:"今週(こんしゅう)",a:"Minggu Ini"},{k:"来週(らいしゅう)",a:"Minggu Depan"},{k:"先週(せんしゅう)",a:"Minggu Lalu"},{k:"誕生日(たんじょうび)",a:"Hari Ulang Tahun"}
    ];

    let currentIdx = 0;
    let score = 0;

    function startQuiz() {
        quizData.sort(() => Math.random() - 0.5); // Acak Soal
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= quizData.length) {
            alert(`Selesai! Skor kamu: ${score}/${quizData.length}`);
            location.reload();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById('info').innerText = `SOAL ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('bar').style.width = `${((currentIdx) / quizData.length) * 100}%`;
        document.getElementById('word').innerText = q.k;

        // Buat Pilihan Jawaban
        const options = [q.a];
        while (options.length < 4) {
            const randomAns = quizData[Math.floor(Math.random() * quizData.length)].a;
            if (!options.includes(randomAns)) options.push(randomAns);
        }
        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options');
        grid.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'ans-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, q.a, btn);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(chosen, correct, btn) {
        const allBtns = document.querySelectorAll('.ans-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (chosen === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            currentIdx++;
            showQuestion();
        }, 1200);
    }

    startQuiz();
</script>

</html>
