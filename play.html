<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashira Quiz - Playing</title>
    <script src="database.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f5fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .info-text { color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .main-word { font-size: 2.5rem; font-weight: bold; color: #007bff; display: block; margin-bottom: 30px; }
        .ans-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        button { background: #f8f9fa; border: 2px solid #e9ecef; padding: 15px; border-radius: 15px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; color: #444; }
        button:hover { border-color: #007bff; color: #007bff; background: #f0f7ff; }
    </style>
</head>
<body>
    <div class="game-card fade" id="box">
        <div id="info" class="info-text">Menyiapkan...</div>
        <span id="question" class="main-word">....</span>
        <div id="options" class="ans-grid"></div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('hashiraConf')) || {level:'N5', type:'benda', amount:10};
        let currentData = [];
        let currentIndex = 0;
        let correctCount = 0;

        function start() {
            if (typeof db === 'undefined') return alert("Gagal narik database.js!");
            
            // Ambil laci sesuai pilihan di menu
            currentData = db[config.level][config.type];
            
            if (!currentData || currentData.length === 0) {
                alert("Data " + config.level + " " + config.type + " belum ada isinya, Shall!");
                window.location.href = 'index.html'; // Balik ke menu
                return;
            }

            // Acak data dan ambil sesuai jumlah (amount) yang dipilih
            currentData = currentData.sort(() => 0.5 - Math.random()).slice(0, config.amount);
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIndex >= currentData.length) {
                alert("Sugoi! Skor: " + correctCount + "/" + config.amount);
                window.location.href = 'index.html';
                return;
            }

            let soal = currentData[currentIndex];
            document.getElementById('question').innerText = soal.k;
            document.getElementById('info').innerText = `Soal ${currentIndex + 1} dari ${config.amount}`;

            // Bikin 4 pilihan (1 bener, 3 ngasal dari database yang sama)
            let choices = [soal.a];
            let allOptions = db[config.level][config.type];
            while (choices.length < 4 && allOptions.length >= 4) {
                let rand = allOptions[Math.floor(Math.random() * allOptions.length)].a;
                if (!choices.includes(rand)) choices.push(rand);
            }
            choices.sort(() => 0.5 - Math.random());

            const div = document.getElementById('options');
            div.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                btn.onclick = () => {
                    if (c === soal.a) {
                        correctCount++;
                        alert("Bener! 🔥");
                    } else {
                        alert("Salah cuy! Jawabannya: " + soal.a);
                    }
                    currentIndex++;
                    nextQuestion();
                };
                div.appendChild(btn);
            });
        }

        window.onload = start;
    </script>
</body>
</html>
