<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Hashira - Playing</title>
    <style>
        :root {
            --bg-color: #e7f3ff;
            --primary-blue: #007bff;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-box { background: var(--white); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .progress-bar { font-size: 0.8rem; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .question-card { background: #f8fbff; border: 2px dashed var(--primary-blue); padding: 40px 20px; border-radius: 15px; margin-bottom: 25px; }
        .kanji { font-size: 2.5rem; font-weight: bold; color: var(--primary-blue); display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-btn { background: var(--white); border: 2px solid #dee2e6; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: 0.3s; }
        .option-btn:hover { border-color: var(--primary-blue); background: #f0f7ff; }
        .score-final { font-size: 1.2rem; margin: 20px 0; font-weight: bold; }
        .btn-home { background: var(--primary-blue); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-box" id="game-container">
    <div id="quiz-ui">
        <div class="progress-bar" id="progress">SOAL 1 / --</div>
        <div class="question-card">
            <span class="kanji" id="display-word">...</span>
        </div>
        <div class="options-grid" id="options-container">
            </div>
    </div>
</div>

<script>
    // DATABASE KOTOBA (N5 & N4)
    // Lu bisa terus tambah data di bawah ini sampai masing-masing 100
    const database = {
        "N5": {
            "benda": [
                { k: "本 (Hon)", a: "Buku" }, { k: "車 (Kuruma)", a: "Mobil" }, { k: "水 (Mizu)", a: "Air" },
                { k: "学生 (Gakusei)", a: "Siswa" }, { k: "先生 (Sensei)", a: "Guru" }, { k: "机 (Tsukue)", a: "Meja" },
                { k: "椅子 (Isu)", a: "Kursi" }, { k: "電話 (Denwa)", a: "Telepon" }, { k: "靴 (Kutsu)", a: "Sepatu" },
                { k: "鞄 (Kaban)", a: "Tas" } // ... tambahkan sampai 100
            ],
            "sifat": [
                { k: "高い (Takai)", a: "Tinggi/Mahal" }, { k: "低い (Hikui)", a: "Rendah" }, { k: "暑い (Atsui)", a: "Panas (Cuaca)" },
                { k: "寒い (Samui)", a: "Dingin (Cuaca)" }, { k: "新しい (Atarashii)", a: "Baru" }, { k: "古い (Furui)", a: "Lama/Tua" },
                { k: "大きい (Ookii)", a: "Besar" }, { k: "小さい (Chiisai)", a: "Kecil" } // ... tambahkan sampai 100
            ],
            "kerja": [
                { k: "食べる (Taberu)", a: "Makan" }, { k: "飲む (Nomu)", a: "Minum" }, { k: "行く (Iku)", a: "Pergi" },
                { k: "来る (Kuru)", a: "Datang" }, { k: "寝る (Neru)", a: "Tidur" }, { k: "起きる (Okiru)", a: "Bangun" },
                { k: "見る (Miru)", a: "Melihat" }, { k: "聞く (Kiku)", a: "Mendengar" } // ... tambahkan sampai 100
            ]
        },
        "N4": {
            "benda": [
                { k: "試験 (Shiken)", a: "Ujian" }, { k: "家事 (Kaji)", a: "Pekerjaan Rumah" }, { k: "地震 (Jishin)", a: "Gempa Bumi" },
                { k: "都合 (Tsugou)", a: "Keadaan/Kondisi" }, { k: "予定 (Yotei)", a: "Rencana" } // ... tambahkan sampai 100
            ],
            "sifat": [
                { k: "不便 (Fuben)", a: "Tidak Praktis" }, { k: "親切 (Shinsetsu)", a: "Ramah/Baik Hati" },
                { k: "熱心 (Nesshin)", a: "Tekun/Semangat" }, { k: "適当 (Tekitou)", a: "Cocok/Asal-asalan" } // ... tambahkan sampai 100
            ],
            "kerja": [
                { k: "運ぶ (Hakobu)", a: "Membawa" }, { k: "用意する (Youi suru)", a: "Bersiap" },
                { k: "相談する (Soudan suru)", a: "Berkonsultasi" }, { k: "届ける (Todokeru)", a: "Mengirimkan" } // ... tambahkan sampai 100
            ]
        }
    };

    // Ambil Konfigurasi dari Page 1
    const config = JSON.parse(localStorage.getItem('quizConfig')) || { level: 'N5', type: 'benda', amount: 10 };
    
    let quizData = [];
    let currentIndex = 0;
    let score = 0;

    function initQuiz() {
        const pool = database[config.level][config.type];
        
        // Cek jika data ada
        if (!pool || pool.length === 0) {
            alert("Data belum tersedia untuk kategori ini!");
            window.location.href = 'quiz.html';
            return;
        }

        // Acak pool data dan ambil sesuai jumlah yang diinginkan
        quizData = [...pool].sort(() => 0.5 - Math.random()).slice(0, config.amount);
        renderQuestion();
    }

    function renderQuestion() {
        if (currentIndex >= quizData.length) {
            showResult();
            return;
        }

        const currentWord = quizData[currentIndex];
        document.getElementById('progress').innerText = `SOAL ${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('display-word').innerText = currentWord.k;

        // Generate Pilihan (1 Benar, 3 Salah)
        let options = [currentWord.a];
        let allMeanings = database[config.level][config.type].map(item => item.a);
        
        while (options.length < 4 && options.length < allMeanings.length) {
            let randomMeaning = allMeanings[Math.floor(Math.random() * allMeanings.length)];
            if (!options.includes(randomMeaning)) {
                options.push(randomMeaning);
            }
        }
        
        // Acak posisi tombol pilihan
        options.sort(() => 0.5 - Math.random());

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt, currentWord.a);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected, correct) {
        if (selected === correct) score++;
        currentIndex++;
        renderQuestion();
    }

    function showResult() {
        const container = document.getElementById('game-container');
        let pesan = score === quizData.length ? "Luar Biasa! 🔥" : "Tetap Semangat! 💪";
        
        container.innerHTML = `
            <h2>Hasil Quiz</h2>
            <div class="score-final">${score} / ${quizData.length} Benar</div>
            <p>${pesan}</p>
            <button class="btn-home" onclick="window.location.href='quiz.html'">Kembali ke Menu</button>
        `;
    }

    initQuiz();
</script>
</body>
</html>
